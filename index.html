  Replace YOUR_PUBLISHED_GOOGLE_SHEET_CSV_URL_HERE below:
    1. Google Sheets > File > Share > Publish to web
    2. Select "Reviews" sheet + CSV format > Publish
    3. Copy the URL and paste it below

<div id="lb-reviews-section">
  <div class="lb-header">
    <span class="lb-logo-text">Reviews on</span>
    <svg class="lb-logo" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg" aria-label="Letterboxd">
      <text y="78" font-family="Georgia, serif" font-size="80" fill="currentColor" letter-spacing="-2">letterboxd</text>
    </svg>
  </div>

  <div class="lb-carousel-wrapper">
    <button class="lb-arrow lb-arrow--prev" aria-label="Previous review">&#8592;</button>
    <div class="lb-carousel-track-outer">
      <div class="lb-carousel-track" id="lbTrack">
        <div class="lb-loading">Loading reviews…</div>
      </div>
    </div>
    <button class="lb-arrow lb-arrow--next" aria-label="Next review">&#8594;</button>
  </div>

  <div class="lb-dots" id="lbDots"></div>
</div>

<style>
  #lb-reviews-section {
    --lb-green: #00C030;
    --lb-orange: #FF8000;
    --lb-text: #1a1a1a;
    --lb-subtext: #555;
    --lb-card-bg: #ffffff;
    --lb-card-shadow: 0 4px 24px rgba(0,0,0,0.10);
    --lb-card-radius: 16px;
    --lb-font-body: Georgia, 'Times New Roman', serif;
    --lb-font-ui: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    --lb-transition: 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 48px 0 56px;
    width: 100%;
    box-sizing: border-box;
    background: transparent;
    font-family: var(--lb-font-body);
  }

  .lb-header {
    text-align: center;
    margin-bottom: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .lb-logo-text {
    font-family: var(--lb-font-ui);
    font-size: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--lb-subtext);
  }
  .lb-logo { height: 22px; width: auto; color: var(--lb-text); }

  .lb-carousel-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 820px;
    margin: 0 auto;
    padding: 0 8px;
    box-sizing: border-box;
  }
  .lb-carousel-track-outer {
    flex: 1;
    overflow: hidden;
    border-radius: var(--lb-card-radius);
  }
  .lb-carousel-track {
    display: flex;
    transition: transform var(--lb-transition);
  }

  .lb-card {
    min-width: 100%;
    box-sizing: border-box;
    background: var(--lb-card-bg);
    border-radius: var(--lb-card-radius);
    box-shadow: var(--lb-card-shadow);
    padding: 44px 52px 40px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    text-align: center;
  }

  .lb-rating {
    display: flex;
    justify-content: center;
    gap: 3px;
    font-size: 22px;
    line-height: 1;
    min-height: 26px;
  }
  .lb-star { color: var(--lb-green); }
  .lb-heart { color: var(--lb-orange); font-size: 18px; }

  .lb-review-text {
    font-family: var(--lb-font-body);
    font-size: clamp(15px, 2vw, 18px);
    line-height: 1.65;
    color: var(--lb-text);
    font-style: italic;
  }
  .lb-review-text::before { content: '\201C'; }
  .lb-review-text::after  { content: '\201D'; }

  .lb-reviewer {
    font-family: var(--lb-font-ui);
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--lb-subtext);
  }
  .lb-reviewer a {
    color: var(--lb-subtext);
    text-decoration: none;
    border-bottom: 1px solid rgba(0,0,0,0.15);
    padding-bottom: 1px;
    transition: color 0.2s, border-color 0.2s;
  }
  .lb-reviewer a:hover { color: var(--lb-green); border-color: var(--lb-green); }

  .lb-arrow {
    flex-shrink: 0;
    background: none;
    border: 1.5px solid rgba(0,0,0,0.18);
    border-radius: 50%;
    width: 44px; height: 44px;
    font-size: 18px;
    cursor: pointer;
    color: var(--lb-text);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .lb-arrow:hover { background: var(--lb-green); border-color: var(--lb-green); color: #fff; }
  .lb-arrow:disabled { opacity: 0.25; cursor: default; }

  .lb-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 24px;
  }
  .lb-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(0,0,0,0.18);
    border: none; padding: 0;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .lb-dot.active { background: var(--lb-green); transform: scale(1.3); }

  .lb-loading, .lb-error {
    min-width: 100%;
    text-align: center;
    padding: 48px 24px;
    font-family: var(--lb-font-ui);
    font-size: 14px;
    color: var(--lb-subtext);
  }

  @media (max-width: 600px) {
    .lb-card { padding: 32px 24px 28px; }
    .lb-arrow { width: 36px; height: 36px; font-size: 15px; }
  }
</style>

<script>
(function() {

  // 👇 Paste your published Google Sheet CSV URL here
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQy1qjeHwi4z5Kap2O7zVAqx4zIL9gSTmfZOwqptpDKM826EOboP1jH3OHRW78oyTy7aN9ZKkTbHCrk/pub?gid=84309440&single=true&output=csv";

  const MAX_CHARS = 280;

  // ---- Render stars + heart ----
  function renderStars(ratingStr) {
    const r = parseFloat(ratingStr);
    if (isNaN(r) || r <= 0) return "";
    const full = Math.floor(r);
    const half = (r % 1) >= 0.5 ? "½" : "";
    const heart = r >= 4.5 ? `<span class="lb-heart">♥</span>` : "";
    let html = "";
    for (let i = 0; i < full; i++) html += `<span class="lb-star">★</span>`;
    if (half) html += `<span class="lb-star">${half}</span>`;
    return html + heart;
  }

  function truncate(text, max) {
    if (!text || text.length <= max) return text;
    return text.slice(0, max).replace(/\s+\S*$/, "") + "…";
  }

  // ---- Simple CSV parser ----
  function parseCSV(text) {
    const rows = [];
    let row = [], field = "", inQ = false;
    for (let i = 0; i < text.length; i++) {
      const c = text[i], n = text[i+1];
      if (inQ) {
        if (c === '"' && n === '"') { field += '"'; i++; }
        else if (c === '"') { inQ = false; }
        else field += c;
      } else {
        if (c === '"') inQ = true;
        else if (c === ',') { row.push(field); field = ""; }
        else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ""; }
        else if (c !== '\r') field += c;
      }
    }
    if (field || row.length) { row.push(field); rows.push(row); }
    return rows;
  }

  // ---- Build carousel ----
  function buildCarousel(reviews) {
    const track = document.getElementById("lbTrack");
    const dotsEl = document.getElementById("lbDots");
    track.innerHTML = "";
    dotsEl.innerHTML = "";

    reviews.forEach((r, i) => {
      const card = document.createElement("div");
      card.className = "lb-card";
      const stars = renderStars(r.rating);
      card.innerHTML = `
        ${stars ? `<div class="lb-rating">${stars}</div>` : ""}
        <p class="lb-review-text">${truncate(r.review, MAX_CHARS)}</p>
        <div class="lb-reviewer">
          <a href="${r.link || 'https://letterboxd.com/film/the-plan-2026/'}" target="_blank" rel="noopener">— ${r.reviewer}</a>
        </div>
      `;
      track.appendChild(card);

      const dot = document.createElement("button");
      dot.className = "lb-dot" + (i === 0 ? " active" : "");
      dot.setAttribute("aria-label", `Review ${i+1}`);
      dot.addEventListener("click", () => goTo(i));
      dotsEl.appendChild(dot);
    });

    let current = 0;
    const total = reviews.length;
    const prev = document.querySelector(".lb-arrow--prev");
    const next = document.querySelector(".lb-arrow--next");

    function goTo(idx) {
      current = (idx + total) % total;
      track.style.transform = `translateX(-${current * 100}%)`;
      document.querySelectorAll(".lb-dot").forEach((d, i) =>
        d.classList.toggle("active", i === current));
    }

    prev.addEventListener("click", () => goTo(current - 1));
    next.addEventListener("click", () => goTo(current + 1));

    // Auto-advance every 6 seconds, pause on hover
    let timer = setInterval(() => goTo(current + 1), 6000);
    const section = document.getElementById("lb-reviews-section");
    section.addEventListener("mouseenter", () => clearInterval(timer));
    section.addEventListener("mouseleave", () => {
      clearInterval(timer);
      timer = setInterval(() => goTo(current + 1), 6000);
    });

    // Swipe support
    let tx = 0;
    const outer = document.querySelector(".lb-carousel-track-outer");
    outer.addEventListener("touchstart", e => { tx = e.touches[0].clientX; }, { passive: true });
    outer.addEventListener("touchend", e => {
      const diff = tx - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) goTo(diff > 0 ? current + 1 : current - 1);
    });

    goTo(0);
  }

  // ---- Load from Sheet ----
  async function load() {
    const track = document.getElementById("lbTrack");

    if (!SHEET_CSV_URL || SHEET_CSV_URL.includes("YOUR_PUBLISHED")) {
      track.innerHTML = `<div class="lb-error">⚙️ Add your Google Sheet CSV URL to the code.</div>`;
      return;
    }

    try {
      const res = await fetch(SHEET_CSV_URL);
      if (!res.ok) throw new Error("Could not load sheet");
      const rows = parseCSV(await res.text());
      if (rows.length < 2) throw new Error("No data");

      // Columns: Approved, Reviewer, Rating, Review, Link
      const approved = rows.slice(1)
        .filter(r => r[0] && r[0].trim().toLowerCase() === "yes")
        .map(r => ({
          reviewer: r[1] || "Anonymous",
          rating:   r[2] || "",
          review:   r[3] || "",
          link:     r[4] || "",
        }))
        .filter(r => r.review.length > 0);

      if (approved.length === 0) {
        track.innerHTML = `<div class="lb-error">No approved reviews yet.</div>`;
        return;
      }

      buildCarousel(approved);

    } catch(e) {
      track.innerHTML = `<div class="lb-error">Could not load reviews — check your Sheet URL.</div>`;
    }
  }

  load();
})();
</script>
