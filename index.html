<div id="lb-reviews-section">
  <div class="lb-header">
    <span class="lb-logo-text">Reviews on</span>
    <svg class="lb-logo" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg" aria-label="Letterboxd">
      <text y="78" font-family="Georgia, serif" font-size="80" fill="currentColor" letter-spacing="-2">letterboxd</text>
    </svg>
  </div>

  <div class="lb-carousel-wrapper">
    <button class="lb-arrow lb-arrow--prev" aria-label="Previous review">&#8592;</button>
    <div class="lb-carousel-track-outer">
      <div class="lb-carousel-track" id="lbTrack">
        <div class="lb-loading">Loading reviews…</div>
      </div>
    </div>
    <button class="lb-arrow lb-arrow--next" aria-label="Next review">&#8594;</button>
  </div>

  <div class="lb-dots" id="lbDots"></div>
</div>

<style>
  /* ---- Root Variables ---- */
  #lb-reviews-section {
    --lb-green: #00C030;
    --lb-orange: #FF8000;
    --lb-bg: transparent;
    --lb-text: #1a1a1a;
    --lb-subtext: #555;
    --lb-card-bg: #ffffff;
    --lb-card-shadow: 0 4px 24px rgba(0,0,0,0.10);
    --lb-card-radius: 16px;
    --lb-font-body: Georgia, 'Times New Roman', serif;
    --lb-font-ui: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    --lb-transition: 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 48px 0 56px;
    width: 100%;
    box-sizing: border-box;
    background: var(--lb-bg);
    font-family: var(--lb-font-body);
  }

  /* ---- Header ---- */
  .lb-header {
    text-align: center;
    margin-bottom: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .lb-logo-text {
    font-family: var(--lb-font-ui);
    font-size: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--lb-subtext);
  }
  .lb-logo {
    height: 22px;
    width: auto;
    color: var(--lb-text);
  }

  /* ---- Carousel wrapper ---- */
  .lb-carousel-wrapper {
    display: flex;
    align-items: center;
    gap: 12px;
    max-width: 820px;
    margin: 0 auto;
    padding: 0 8px;
    box-sizing: border-box;
  }
  .lb-carousel-track-outer {
    flex: 1;
    overflow: hidden;
    border-radius: var(--lb-card-radius);
  }
  .lb-carousel-track {
    display: flex;
    transition: transform var(--lb-transition);
    will-change: transform;
  }

  /* ---- Individual Card ---- */
  .lb-card {
    min-width: 100%;
    box-sizing: border-box;
    background: var(--lb-card-bg);
    border-radius: var(--lb-card-radius);
    box-shadow: var(--lb-card-shadow);
    padding: 44px 52px 40px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    text-align: center;
  }

  /* ---- Stars / Hearts ---- */
  .lb-rating {
    display: flex;
    justify-content: center;
    gap: 3px;
    font-size: 22px;
    line-height: 1;
    min-height: 26px;
  }
  .lb-star { color: var(--lb-green); }
  .lb-half-star { color: var(--lb-green); }
  .lb-heart { color: var(--lb-orange); font-size: 18px; }

  /* ---- Review text ---- */
  .lb-review-text {
    font-family: var(--lb-font-body);
    font-size: clamp(15px, 2vw, 18px);
    line-height: 1.65;
    color: var(--lb-text);
    font-style: italic;
  }
  .lb-review-text::before { content: '\201C'; }
  .lb-review-text::after  { content: '\201D'; }

  /* ---- Reviewer name ---- */
  .lb-reviewer {
    font-family: var(--lb-font-ui);
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--lb-subtext);
  }
  .lb-reviewer a {
    color: var(--lb-subtext);
    text-decoration: none;
    border-bottom: 1px solid rgba(0,0,0,0.15);
    padding-bottom: 1px;
    transition: color 0.2s, border-color 0.2s;
  }
  .lb-reviewer a:hover {
    color: var(--lb-green);
    border-color: var(--lb-green);
  }

  /* ---- Arrows ---- */
  .lb-arrow {
    flex-shrink: 0;
    background: none;
    border: 1.5px solid rgba(0,0,0,0.18);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 18px;
    cursor: pointer;
    color: var(--lb-text);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .lb-arrow:hover {
    background: var(--lb-green);
    border-color: var(--lb-green);
    color: #fff;
  }
  .lb-arrow:disabled {
    opacity: 0.25;
    cursor: default;
  }

  /* ---- Dots ---- */
  .lb-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 24px;
  }
  .lb-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(0,0,0,0.18);
    border: none;
    padding: 0;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }
  .lb-dot.active {
    background: var(--lb-green);
    transform: scale(1.3);
  }

  /* ---- Loading / Error states ---- */
  .lb-loading, .lb-error {
    min-width: 100%;
    text-align: center;
    padding: 48px 24px;
    font-family: var(--lb-font-ui);
    font-size: 14px;
    color: var(--lb-subtext);
  }

  /* ---- Mobile ---- */
  @media (max-width: 600px) {
    .lb-card { padding: 32px 24px 28px; }
    .lb-arrow { width: 36px; height: 36px; font-size: 15px; }
  }
</style>

<script>
(function() {
  // ============================================================
  // 👇 REPLACE THIS with your published Google Sheet CSV URL
  // File > Share > Publish to web > Reviews sheet > CSV
  // ============================================================
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQy1qjeHwi4z5Kap2O7zVAqx4zIL9gSTmfZOwqptpDKM826EOboP1jH3OHRW78oyTy7aN9ZKkTbHCrk/pub?gid=84309440&single=true&output=csv";

  // How many characters before a review gets truncated with "..."
  const MAX_CHARS = 280;

  // ---- Helpers ----

  function renderStars(ratingStr) {
    const rating = parseFloat(ratingStr);
    if (isNaN(rating) || rating <= 0) return "";

    const full  = Math.floor(rating);
    const half  = (rating % 1) >= 0.5 ? 1 : 0;
    let html = "";

    for (let i = 0; i < full; i++) html += `<span class="lb-star">★</span>`;
    if (half)                        html += `<span class="lb-half-star">½</span>`;

    // Letterboxd uses a heart (♥) for films you loved — show it for 5-star or 4.5+ ratings
    if (rating >= 4.5) html += ` <span class="lb-heart">♥</span>`;

    return html;
  }

  function truncate(text, max) {
    if (!text) return "";
    text = text.trim();
    if (text.length <= max) return text;
    return text.slice(0, max).replace(/\s+\S*$/, "") + "…";
  }

  function parseCSV(text) {
    // Simple CSV parser that handles quoted fields with commas/newlines
    const rows = [];
    let row = [], field = "", inQuotes = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i], next = text[i+1];
      if (inQuotes) {
        if (ch === '"' && next === '"') { field += '"'; i++; }
        else if (ch === '"') { inQuotes = false; }
        else { field += ch; }
      } else {
        if (ch === '"') { inQuotes = true; }
        else if (ch === ',') { row.push(field); field = ""; }
        else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ""; }
        else if (ch === '\r') { /* skip */ }
        else { field += ch; }
      }
    }
    if (field || row.length) { row.push(field); rows.push(row); }
    return rows;
  }

  // ---- Build carousel ----
  function buildCarousel(reviews) {
    const track = document.getElementById("lbTrack");
    const dotsEl = document.getElementById("lbDots");
    track.innerHTML = "";
    dotsEl.innerHTML = "";

    reviews.forEach((r, i) => {
      const card = document.createElement("div");
      card.className = "lb-card";

      const stars = renderStars(r.rating);
      const text  = truncate(r.review, MAX_CHARS);

      card.innerHTML = `
        ${stars ? `<div class="lb-rating">${stars}</div>` : ""}
        <p class="lb-review-text">${text}</p>
        <div class="lb-reviewer">
          <a href="${r.link || "https://letterboxd.com/film/the-plan-2026/"}" target="_blank" rel="noopener">— ${r.reviewer}</a>
        </div>
      `;
      track.appendChild(card);

      const dot = document.createElement("button");
      dot.className = "lb-dot" + (i === 0 ? " active" : "");
      dot.setAttribute("aria-label", `Review ${i+1}`);
      dot.addEventListener("click", () => goTo(i));
      dotsEl.appendChild(dot);
    });

    // Arrow controls
    let current = 0;
    const total = reviews.length;
    const prevBtn = document.querySelector(".lb-arrow--prev");
    const nextBtn = document.querySelector(".lb-arrow--next");

    function goTo(idx) {
      current = (idx + total) % total;
      track.style.transform = `translateX(-${current * 100}%)`;
      document.querySelectorAll(".lb-dot").forEach((d, i) =>
        d.classList.toggle("active", i === current)
      );
      prevBtn.disabled = false;
      nextBtn.disabled = false;
    }

    prevBtn.addEventListener("click", () => goTo(current - 1));
    nextBtn.addEventListener("click", () => goTo(current + 1));

    // Auto-advance every 6 seconds
    let autoTimer = setInterval(() => goTo(current + 1), 6000);
    document.getElementById("lb-reviews-section").addEventListener("mouseenter", () => clearInterval(autoTimer));
    document.getElementById("lb-reviews-section").addEventListener("mouseleave", () => {
      clearInterval(autoTimer);
      autoTimer = setInterval(() => goTo(current + 1), 6000);
    });

    // Touch/swipe support
    let touchStartX = 0;
    const trackOuter = document.querySelector(".lb-carousel-track-outer");
    trackOuter.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    trackOuter.addEventListener("touchend", e => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) goTo(diff > 0 ? current + 1 : current - 1);
    });

    goTo(0);
  }

  // ---- Fetch from Google Sheet ----
  async function loadReviews() {
    const track = document.getElementById("lbTrack");

    if (!SHEET_CSV_URL || SHEET_CSV_URL.includes("YOUR_PUBLISHED")) {
      track.innerHTML = `<div class="lb-error">⚙️ Please set your Google Sheet CSV URL in the code block.</div>`;
      return;
    }

    try {
      const res = await fetch(SHEET_CSV_URL);
      if (!res.ok) throw new Error("Sheet fetch failed");
      const text = await res.text();
      const rows = parseCSV(text);

      if (rows.length < 2) {
        track.innerHTML = `<div class="lb-error">No reviews found yet.</div>`;
        return;
      }

      // Header row: ID, Approved, Reviewer, Rating, Review Text, Letterboxd Link, Review Date, Date Added
      const headers = rows[0].map(h => h.trim().toLowerCase());
      const idxApproved = headers.indexOf("approved");
      const idxReviewer = headers.indexOf("reviewer");
      const idxRating   = headers.indexOf("rating");
      const idxReview   = headers.indexOf("review text");
      const idxLink     = headers.indexOf("letterboxd link");

      const approved = rows.slice(1).filter(r => {
        return r[idxApproved] && r[idxApproved].trim().toLowerCase() === "yes";
      }).map(r => ({
        reviewer: r[idxReviewer] || "Anonymous",
        rating:   r[idxRating]   || "",
        review:   r[idxReview]   || "",
        link:     r[idxLink]     || "",
      })).filter(r => r.review.length > 0);

      if (approved.length === 0) {
        track.innerHTML = `<div class="lb-error">No approved reviews yet.</div>`;
        return;
      }

      buildCarousel(approved);

    } catch(e) {
      console.error(e);
      track.innerHTML = `<div class="lb-error">Could not load reviews. Check your Sheet URL.</div>`;
    }
  }

  loadReviews();
})();
</script>
